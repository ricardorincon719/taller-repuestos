{% extends "base.html" %}
{% block title %}{{ title }} | Taller Pro{% endblock %}
{% block content %}
<div class="page-heading"><div><p class="eyebrow">{{ customer.name }}</p><h1>{{ title }}</h1></div></div>
<form method="post" class="panel stacked-form">
  {% csrf_token %}
  {{ form.non_field_errors }}
  <div class="form-grid">
  {% for field in form %}
    <div class="field {% if field.name == 'notes' %}wide{% endif %}">{{ field.label_tag }}{{ field }}{{ field.errors }}</div>
  {% endfor %}
  </div>
  <div class="actions"><a href="{% url 'customer-detail' customer.pk %}">Cancelar</a><button class="primary" type="submit">Guardar vehículo</button></div>
</form>
{% endblock %}
