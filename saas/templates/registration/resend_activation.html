{% extends "base.html" %}
{% load i18n %}
{% block title %}{% trans "Reenviar activación" %} | Taller Pro{% endblock %}
{% block content %}
<section class="auth-card">
  <p class="eyebrow">{% trans "Activación" %}</p>
  <h1>{% trans "Reenviar enlace" %}</h1>
  <form method="post" class="stacked-form">
    {% csrf_token %}
    {{ form.email.label_tag }}{{ form.email }}{{ form.email.errors }}
    <button class="primary" type="submit">{% trans "Enviar enlace" %}</button>
  </form>
</section>
{% endblock %}
