{% extends "base.html" %}
{% block title %}Nueva contraseña | Taller Pro{% endblock %}
{% block content %}
<section class="auth-card">
  {% if validlink %}
    <p class="eyebrow">Nuevo acceso</p>
    <h1>Define una contraseña</h1>
    <form method="post" class="stacked-form">
      {% csrf_token %}
      {{ form.as_p }}
      <button class="primary" type="submit">Guardar contraseña</button>
    </form>
  {% else %}
    <h1>Enlace inválido o vencido</h1>
    <a href="{% url 'password_reset' %}">Solicitar uno nuevo</a>
  {% endif %}
</section>
{% endblock %}
